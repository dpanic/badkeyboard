; GhostScribe — Waveshare ESP32-S3-GEEK USB-HID typer + onboard 1.14" ST7789 LCD
;
; Board: Waveshare ESP32-S3-GEEK (ESP32-S3R2 = 2MB QSPI PSRAM, 16MB flash, native USB).
; Display: 1.14" ST7789, 240x135, 4-wire SPI. Pins live in the LGFX class in main.cpp.
; USB: ARDUINO_USB_MODE=0 -> USB-OTG / TinyUSB, REQUIRED for HID (NOT =1).

[env:esp32-s3-geek]
platform  = espressif32
board     = esp32-s3-devkitc-1     ; generic ESP32-S3; no dedicated GEEK board def
framework = arduino
monitor_speed = 115200

board_build.flash_mode          = qio
board_build.arduino.memory_type  = qio_qspi   ; S3R2 has QSPI PSRAM (NOT OPI)

lib_deps =
    lovyan03/LovyanGFX

; lets PlatformIO re-flash even after the firmware takes over USB as an HID device
board_upload.use_1200bps_touch    = yes
board_upload.wait_for_upload_port = yes

build_flags =
    -D ARDUINO_USB_MODE=0          ; USB-OTG / TinyUSB (CRITICAL: 0, not 1) -> HID
    -D ARDUINO_USB_CDC_ON_BOOT=1   ; keep a CDC serial console alongside HID
    -D DISABLE_ALL_LIBRARY_WARNINGS
